<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recent Matches — e-Scoreboards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{
      --bg:#071A12;
      --panel:#0b2218;
      --panel-2:#102b20;
      --line:#214436;
      --text:#f4f7f5;
      --muted:#a7b7af;
      --accent:#97d85f;
      --accent-2:#d6ffb7;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      font-family:Inter,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 20% 20%, rgba(170,90,20,.35), transparent 28%),
        radial-gradient(circle at 75% 70%, rgba(20,120,90,.28), transparent 30%),
        linear-gradient(180deg, #071A12 0%, #081711 100%);
      min-height:100vh;
    }

    .wrap{
      max-width:1200px;
      margin:0 auto;
      padding:32px 20px 56px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      padding:14px 18px;
      border:1px solid rgba(255,255,255,.08);
      background:rgba(10,16,12,.72);
      border-radius:22px;
      backdrop-filter: blur(8px);
      margin-bottom:22px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
      font-weight:800;
      letter-spacing:.2px;
      font-size:28px;
    }

    .dot{
      width:36px;
      height:36px;
      border-radius:12px;
      background:linear-gradient(135deg, #6f8f61, #c1d99c);
      box-shadow:0 0 0 6px rgba(151,216,95,.08);
    }

    .nav{
      display:flex;
      gap:24px;
      align-items:center;
      flex-wrap:wrap;
    }

    .nav a{
      color:var(--text);
      text-decoration:none;
      font-weight:600;
      opacity:.92;
    }

    .hero{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(10,16,12,.72);
      border-radius:26px;
      padding:26px 24px;
      margin-bottom:22px;
      backdrop-filter: blur(8px);
    }

    .eyebrow{
      color:var(--accent);
      font-size:14px;
      font-weight:700;
      margin-bottom:10px;
    }

    h1{
      margin:0 0 8px;
      font-size:34px;
      line-height:1.1;
    }

    .sub{
      margin:0;
      color:var(--muted);
      font-size:15px;
    }

    .panel{
      border:1px solid rgba(255,255,255,.08);
      background:rgba(10,16,12,.72);
      border-radius:26px;
      padding:20px;
      backdrop-filter: blur(8px);
    }

    .toolbar{
      display:grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap:12px;
      margin-bottom:16px;
    }

    select, button{
      width:100%;
      padding:12px 14px;
      border-radius:14px;
      border:1px solid var(--line);
      background:var(--panel);
      color:var(--text);
      font:inherit;
    }

    button{
      background:linear-gradient(180deg, #44531a, #303d12);
      border-color:#55691f;
      font-weight:700;
      cursor:pointer;
      padding-inline:18px;
    }

    .table-wrap{
      overflow:auto;
      border-radius:18px;
      border:1px solid var(--line);
      background:rgba(8,18,13,.72);
    }

    table{
      width:100%;
      border-collapse:collapse;
      min-width:900px;
    }

    thead th{
      text-align:left;
      font-size:13px;
      color:#dce8df;
      padding:14px 16px;
      background:#0a1712;
      border-bottom:1px solid var(--line);
    }

    tbody td{
      padding:15px 16px;
      border-bottom:1px solid rgba(33,68,54,.6);
      color:#eef3ef;
      vertical-align:middle;
    }

    tbody tr:hover{
      background:rgba(20,40,30,.6);
    }

    .score{
      font-weight:800;
      color:var(--accent-2);
      letter-spacing:.3px;
    }

    .muted{
      color:var(--muted);
    }

    .badge{
      display:inline-block;
      padding:6px 10px;
      border-radius:999px;
      background:#11261d;
      border:1px solid var(--line);
      color:#dff0d9;
      font-size:12px;
      font-weight:700;
    }

    .empty{
      padding:24px;
      color:var(--muted);
    }

    @media (max-width: 900px){
      .toolbar{
        grid-template-columns:1fr;
      }
      h1{
        font-size:28px;
      }
      .brand{
        font-size:22px;
      }
      .topbar{
        flex-direction:column;
        align-items:flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="topbar">
      <div class="brand">
        <div class="dot"></div>
        <div>e-Scoreboards</div>
      </div>
      <div class="nav">
        <a href="/">Home</a>
        <a href="/tennislive-match/">Live Courts</a>
        <a href="/matches/">Recent Matches</a>
      </div>
    </div>

    <section class="hero">
      <div class="eyebrow">Match Archive</div>
      <h1>Recent Matches</h1>
      <p class="sub">Browse the latest completed matches across clubs and courts.</p>
    </section>

    <section class="panel">
      <div class="toolbar">
        <select id="countryFilter">
          <option value="">All Countries</option>
        </select>

        <select id="clubFilter">
          <option value="">All Clubs</option>
        </select>

        <select id="courtFilter">
          <option value="">All Courts</option>
        </select>

        <button id="refreshBtn">Refresh</button>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Date & Time</th>
              <th>Player A</th>
              <th>Player B</th>
              <th>Score</th>
              <th>Country</th>
              <th>Club</th>
              <th>Court</th>
            </tr>
          </thead>
          <tbody id="matchesBody">
            <tr><td colspan="7" class="empty">Loading matches...</td></tr>
          </tbody>
        </table>
      </div>
    </section>
  </div>

  <script>
    const API_URL = "https://api.escoreboards.eu/api/matches?limit=100";
    let allMatches = [];

    function parseCourtKey(courtKey = "") {
      const parts = String(courtKey).split("/").filter(Boolean);
      return {
        country: parts[0] || "",
        region: parts[1] || "",
        club: parts[2] || "",
        court: parts[3] || ""
      };
    }

    function prettyLabel(value) {
      return String(value || "")
        .replace(/-/g, " ")
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function fillSelect(selectEl, values, placeholder) {
      const current = selectEl.value;
      selectEl.innerHTML = `<option value="">${placeholder}</option>`;
      values.forEach(v => {
        const opt = document.createElement("option");
        opt.value = v;
        opt.textContent = prettyLabel(v);
        selectEl.appendChild(opt);
      });
      selectEl.value = values.includes(current) ? current : "";
    }

    function renderFilters(items) {
      const countries = [...new Set(items.map(m => parseCourtKey(m.courtKey).country).filter(Boolean))].sort();
      const clubs = [...new Set(items.map(m => parseCourtKey(m.courtKey).club).filter(Boolean))].sort();
      const courts = [...new Set(items.map(m => parseCourtKey(m.courtKey).court).filter(Boolean))].sort();

      fillSelect(document.getElementById("countryFilter"), countries, "All Countries");
      fillSelect(document.getElementById("clubFilter"), clubs, "All Clubs");
      fillSelect(document.getElementById("courtFilter"), courts, "All Courts");
    }

    function renderTable(items) {
      const body = document.getElementById("matchesBody");

      if (!items.length) {
        body.innerHTML = `<tr><td colspan="7" class="empty">No matches found.</td></tr>`;
        return;
      }

      body.innerHTML = "";

      items.forEach(m => {
        const meta = parseCourtKey(m.courtKey);
        const dt = new Date(m.finishedAt || m.submittedAt || Date.now());

        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>
            <div>${dt.toLocaleDateString()}</div>
            <div class="muted">${dt.toLocaleTimeString()}</div>
          </td>
          <td>${m.playerA || "-"}</td>
          <td>${m.playerB || "-"}</td>
          <td class="score">${m.setsA ?? "-"} - ${m.setsB ?? "-"}</td>
          <td><span class="badge">${prettyLabel(meta.country) || "-"}</span></td>
          <td>${prettyLabel(meta.club) || "-"}</td>
          <td>${prettyLabel(meta.court) || "-"}</td>
        `;
        body.appendChild(tr);
      });
    }

    function applyFilters() {
      const country = document.getElementById("countryFilter").value;
      const club = document.getElementById("clubFilter").value;
      const court = document.getElementById("courtFilter").value;

      const filtered = allMatches.filter(m => {
        const meta = parseCourtKey(m.courtKey);
        if (country && meta.country !== country) return false;
        if (club && meta.club !== club) return false;
        if (court && meta.court !== court) return false;
        return true;
      });

      renderTable(filtered);
    }

    async function loadMatches() {
      try {
        const res = await fetch(API_URL);
        const data = await res.json();
        allMatches = Array.isArray(data.items) ? data.items : [];
        renderFilters(allMatches);
        applyFilters();
      } catch (err) {
        document.getElementById("matchesBody").innerHTML =
          `<tr><td colspan="7" class="empty">Failed to load matches.</td></tr>`;
      }
    }

    document.getElementById("countryFilter").addEventListener("change", applyFilters);
    document.getElementById("clubFilter").addEventListener("change", applyFilters);
    document.getElementById("courtFilter").addEventListener("change", applyFilters);
    document.getElementById("refreshBtn").addEventListener("click", loadMatches);

    loadMatches();
  </script>
</body>
</html>
